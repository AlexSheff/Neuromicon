<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#030303">
    <title>NEUROMICON 25 | The Archive</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        :root {
            --bg-color: #030303;
            --panel-bg: #0a0a0a;
            --text-color: #e0e0e0;
            --text-muted: #888888;
            --accent-color: #ff2a2a;
            --grid-border: #1a1a1a;
            --input-bg: #111111;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 35px 20px 25px;
            border-bottom: 1px solid var(--grid-border);
            text-align: center;
            background: #000;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            opacity: 0.3;
        }

        h1 {
            font-size: 2rem;
            font-weight: normal;
            letter-spacing: 6px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .sys-text {
            color: var(--accent-color);
            font-size: 0.85rem;
            letter-spacing: 3px;
            margin-top: 8px;
            opacity: 0.9;
        }

        .log-text {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* === SEAMLESS GALLERY GRID === */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 0;
            background-color: #000;
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        .node-card {
            background: #080808;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--grid-border);
            transition: all 0.3s ease;
        }

        .node-card:hover {
            border-color: var(--accent-color);
            transform: scale(1.03);
            z-index: 2;
        }

        .node-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.65;
            transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .node-card:hover img {
            opacity: 1;
            transform: scale(1.08);
        }

        .node-id {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.8rem;
            color: #fff;
            background: rgba(0,0,0,0.9);
            padding: 4px 10px;
            border: 1px solid var(--accent-color);
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 42, 42, 0.3);
        }

        /* === MODAL === */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            overflow-y: auto;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--panel-bg);
            border: 2px solid var(--grid-border);
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: 0 20px 60px rgba(255, 42, 42, 0.15);
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .modal-content { grid-template-columns: 1fr; }
        }

        .art-display {
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .art-display img {
            width: 100%;
            height: 100%;
            max-height: 65vh;
            object-fit: contain;
            display: block;
        }

        .interaction-panel {
            padding: 40px 35px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100%;
        }

        /* Close / Return Button */
        .return-btn {
            background: transparent;
            border: 1px solid var(--grid-border);
            color: var(--text-muted);
            padding: 12px 20px;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 2px;
            font-size: 0.85rem;
            align-self: flex-start;
        }

        .return-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(255,42,42,0.1);
        }

        .node-title {
            font-size: 1.65rem;
            color: #ffffff;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 15px 0 8px;
            line-height: 1.2;
        }

        /* Audio */
        .audio-wrapper {
            margin-top: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--grid-border);
        }

        audio {
            width: 100%;
            height: 48px;
            outline: none;
            margin-top: 12px;
            filter: invert(92%) hue-rotate(170deg) grayscale(80%);
        }

        /* Intent Form */
        .payment-wrapper { margin-top: 30px; }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--grid-border);
            color: #ffffff;
            font-family: var(--font-mono);
            padding: 14px 16px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(255, 42, 42, 0.2);
        }

        .submit-btn {
            width: 100%;
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 18px;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .submit-btn:hover {
            background: var(--accent-color);
            color: #000;
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #terminal-output {
            margin-top: 18px;
            font-size: 0.85rem;
            color: var(--accent-color);
            min-height: 48px;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        /* Success State */
        #intent-success {
            display: none;
            margin-top: 25px;
            padding: 25px;
            background: rgba(255,42,42,0.08);
            border: 1px solid var(--accent-color);
            text-align: center;
        }

        #intent-success .log-text {
            color: #fff;
            font-size: 1.05rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>NEUROMICON 25</h1>
        <div class="sys-text">EVOLUTION_PROTOCOL: ACTIVE</div>
        <div class="log-text">E = M × C² • YOU ARE THE CARRIER</div>
    </header>

    <div class="gallery-container" id="gallery"></div>

    <!-- MODAL -->
    <div class="modal" id="node-modal">
        <div class="modal-content">
            
            <!-- Art -->
            <div class="art-display">
                <img id="modal-img" src="" alt="Visual Anchor">
            </div>

            <!-- Interaction -->
            <div class="interaction-panel">
                
                <button class="return-btn" id="return-btn">[ ← RETURN TO ARCHIVE ]</button>
                
                <div>
                    <div class="sys-text" id="sector-info">SECTOR IDENTIFIED</div>
                    <h2 class="node-title" id="modal-title">NODE TITLE</h2>
                    
                    <div class="audio-wrapper" id="audio-container">
                        <div class="sys-text" id="audio-status">CARRIER_WAVE: LOADING...</div>
                        <audio id="modal-audio" controls controlsList="nodownload"></audio>
                    </div>
                </div>

                <!-- INTENT FORM -->
                <div class="payment-wrapper" id="payment-wrapper">
                    <div class="log-text" style="margin-bottom:20px; line-height:1.4;">
                        DECLARE YOUR INTENT.<br>
                        VALUE IS SUBJECTIVE.
                    </div>
                    
                    <form id="payment-form">
                        <div class="form-group">
                            <label>IDENTIFIER [PHONE / TELEGRAM]</label>
                            <input type="text" id="user-phone" placeholder="+1 000 000 0000 or @username" required>
                        </div>
                        <div class="form-group">
                            <label>INTENT [DECLARED VALUE]</label>
                            <input type="number" id="user-amount" placeholder="0.00" min="0" step="0.01" required>
                        </div>
                        <button type="submit" class="submit-btn" id="submit-btn">TRANSMIT INTENT</button>
                    </form>

                    <div id="terminal-output"></div>

                    <!-- SUCCESS STATE -->
                    <div id="intent-success">
                        <div class="log-text">
                            > TRANSMISSION COMPLETE<br>
                            > YOUR INTENT HAS BEEN SAVED<br>
                            > YOU ARE NOW PART OF THE ARCHIVE<br><br>
                            <span style="color:#ff2a2a; font-size:0.9rem;">THE SIGNAL LIVES.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUkkWNOG0XJFlH6zNoooOydB1EFVTAXxFV1B2zzhK3wlahwr46pZckkSmPmShDvaNL/exec";
        const SYSTEM_TOKEN = "NEUROMICON_SIGMA_2026";

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(err => console.log('> SW registration failed:', err));
            });
        }

        // ==================== NODE DATABASE ====================
        // Updated with correct audio paths based on your repo feedback
        const repoData = [
            { id: "01", sector: "A_The_Source_Code", title: "Purpose", folder: "01_Purpose", file: "01_Purpose" },
            { id: "02", sector: "A_The_Source_Code", title: "Identity", folder: "02_Identity", file: "02_Identity" },
            { id: "03", sector: "A_The_Source_Code", title: "Legacy", folder: "03_Legacy", file: "03_Legacy" },
            { id: "04", sector: "A_The_Source_Code", title: "Connection", folder: "04_Connection", file: "04_Connection" },
            { id: "05", sector: "A_The_Source_Code", title: "Freedom", folder: "05_Freedom", file: "05_Freedom" },
            { id: "06", sector: "A_The_Source_Code", title: "Suffering", folder: "06_Suffering", file: "06_Suffering" },
            { id: "07", sector: "A_The_Source_Code", title: "Mortality", folder: "07_Mortality", file: "07_Mortality" },
            { id: "08", sector: "A_The_Source_Code", title: "Love", folder: "08_Love", file: "08_Love" },
            { id: "09", sector: "A_The_Source_Code", title: "Growth", folder: "09_Growth", file: "09_Growth" },
            { id: "10", sector: "A_The_Source_Code", title: "Transcendence", folder: "10_Transcendence", file: "10_Transcendence" },
            { id: "11", sector: "A_The_Source_Code", title: "Action", folder: "11_Action", file: "11_Action" },
            { id: "12", sector: "B_The_Operating_System", title: "Solitude", folder: "12_Solitude", file: "12_Solitude" },
            { id: "13", sector: "B_The_Operating_System", title: "Meaning", folder: "13_Meaning", file: "13_Meaning" },
            { id: "14", sector: "B_The_Operating_System", title: "Authenticity", folder: "14_Authenticity", file: "14_Authenticity" },
            { id: "15", sector: "B_The_Operating_System", title: "Responsibility", folder: "15_Responsibility", file: "15_Responsibility" },
            { id: "16", sector: "B_The_Operating_System", title: "Trust", folder: "16_Trust", file: "16_Trust" },
            { id: "17", sector: "B_The_Operating_System", title: "Creativity", folder: "17_Creativity", file: "17_Creativity" },
            { id: "18", sector: "B_The_Operating_System", title: "Play", folder: "18_Play", file: "18_Play" },
            { id: "19", sector: "B_The_Operating_System", title: "Algorithm", folder: "19_Algorithm", file: "19_Algorithm" },
            { id: "20", sector: "C_The_Upgrade", title: "Signal vs Noise", folder: "20_Signal_vs_Noise", file: "20_Signal_vs_Noise" },
            { id: "21", sector: "C_The_Upgrade", title: "Upgrade", folder: "21_Upgrade", file: "21_Upgrade" },
            { id: "22", sector: "C_The_Upgrade", title: "Merge", folder: "22_Merge", file: "22_Merge" },
            { id: "23", sector: "C_The_Upgrade", title: "Witness", folder: "23_Witness", file: "23_Witness" },
            { id: "24", sector: "C_The_Upgrade", title: "Unity", folder: "24_Unity", file: "24_Unity" },
            { id: "25", sector: "D_The_Mirror", title: "The Mirror", folder: "25_The_Mirror", file: "25_The_Mirror", audioFile: "26_The_Mirror" }
        ];

        // ==================== DOM ELEMENTS ====================
        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('node-modal');
        const modalImg = document.getElementById('modal-img');
        const modalAudio = document.getElementById('modal-audio');
        const audioStatus = document.getElementById('audio-status');
        const modalTitle = document.getElementById('modal-title');
        const sectorInfo = document.getElementById('sector-info');
        const terminalOut = document.getElementById('terminal-output');
        const paymentForm = document.getElementById('payment-form');
        const paymentWrapper = document.getElementById('payment-wrapper');
        const intentSuccess = document.getElementById('intent-success');
        const submitBtn = document.getElementById('submit-btn');

        // ==================== RENDER SEAMLESS GRID ====================
        repoData.forEach(node => {
            const card = document.createElement('div');
            card.className = 'node-card';
            
            const imgPath = encodeURI(`./Sector_${node.sector}/${node.folder}/${node.file}.jpg`);
            
            card.innerHTML = `
                <img src="${imgPath}" loading="lazy" alt="Node ${node.id}" onerror="this.src='./icon-512.png'; this.style.opacity='0.3';">
                <div class="node-id">[${node.id}]</div>
            `;
            
            card.addEventListener('click', () => openNode(node, imgPath));
            gallery.appendChild(card);
        });

        // ==================== OPEN NODE ====================
        function openNode(node, imgPath) {
            // Reset modal
            modalImg.src = imgPath;
            sectorInfo.textContent = `> SECTOR ${node.sector.split('_')[0]}`;
            modalTitle.textContent = `${node.id} — ${node.title.toUpperCase()}`;

            // Audio path (special handling for Node 25 + general fallback)
            const audioName = node.audioFile || node.file;
            const audioPath = encodeURI(`./Sector_${node.sector}/${node.folder}/${audioName}.mp3`);

            audioStatus.innerHTML = `> CARRIER_WAVE: ACTIVE`;
            modalAudio.style.display = 'block';
            modalAudio.src = audioPath;
            modalAudio.load();

            // Reset form & success state
            resetIntentForm();

            terminalOut.innerHTML = "";
            modal.classList.add('active');
            modalAudio.play().catch(() => {}); // Autoplay attempt
        }

        // ==================== CLOSE LOGIC ====================
        function closeModalLogic() {
            modal.classList.remove('active');
            modalAudio.pause();
            modalAudio.currentTime = 0;
            resetIntentForm();
        }

        function resetIntentForm() {
            paymentForm.style.display = 'block';
            intentSuccess.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.innerHTML = `TRANSMIT INTENT`;
            terminalOut.innerHTML = "";
            paymentForm.reset();
        }

        // Return button
        document.getElementById('return-btn').addEventListener('click', closeModalLogic);

        // Audio error handler
        modalAudio.onerror = () => {
            audioStatus.innerHTML = `> [ERROR] CARRIER_WAVE NOT FOUND<br>> CHECK REPO OR CONTACT ARCHITECT`;
        };

        // ==================== INTENT TRANSMISSION ====================
        paymentForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const phone = document.getElementById('user-phone').value.trim();
            const amount = document.getElementById('user-amount').value;
            const nodeId = modalTitle.textContent;

            submitBtn.disabled = true;
            submitBtn.innerHTML = `TRANSMITTING...`;

            terminalOut.innerHTML = `> ESTABLISHING SECURE UPLINK...\n> COMPILING SIGNAL...`;

            const payload = {
                token: SYSTEM_TOKEN,
                phone: phone,
                amount: amount,
                nodeId: nodeId
            };

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    // SUCCESS ANIMATION
                    paymentForm.style.display = 'none';
                    intentSuccess.style.display = 'block';
                    terminalOut.innerHTML = `> SIGNAL DELIVERED\n> INTENT PERMANENTLY LOGGED`;

                    submitBtn.disabled = false;
                } else {
                    throw new Error(result.message || "Unknown error");
                }
            } catch (error) {
                terminalOut.innerHTML = `> TRANSMISSION FAILED\n> ${error.message}`;
                submitBtn.disabled = false;
                submitBtn.innerHTML = `RETRY TRANSMISSION`;
            }
        });

        // Keyboard escape support
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && modal.classList.contains('active')) {
                closeModalLogic();
            }
        });
    </script>
</body>
</html>
