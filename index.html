<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEUROMICON | The Archive</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#030303">
    <style>
        :root {
            --bg-color: #030303;
            --panel-bg: #0a0a0a;
            --text-color: #e0e0e0;
            --text-muted: #888888;
            --accent-color: #ff2a2a;
            --grid-border: #222222;
            --input-bg: #111111;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 30px 20px;
            border-bottom: 1px solid var(--grid-border);
            text-align: center;
            letter-spacing: 3px;
            background: #000;
        }

        h1 { font-size: 1.6rem; font-weight: normal; color: #ffffff; }
        .sys-text { color: var(--accent-color); font-size: 0.8rem; letter-spacing: 1px; margin-top: 10px; }
        .log-text { color: var(--text-muted); font-size: 0.75rem; margin-top: 5px; }

        /* Gallery Grid */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1px;
            background-color: var(--grid-border);
            border: 1px solid var(--grid-border);
            max-width: 1000px;
            margin: 40px auto;
        }

        .node-card {
            background: #080808;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
        }

        .node-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            transition: opacity 0.4s ease, transform 0.6s ease;
        }

        .node-card:hover img {
            opacity: 1;
            transform: scale(1.05);
        }
        
        .node-id {
            position: absolute;
            bottom: 8px;
            right: 8px;
            font-size: 0.75rem;
            color: #ffffff;
            background: rgba(0,0,0,0.85);
            padding: 3px 8px;
            border: 1px solid var(--grid-border);
        }

        /* Modal / Node Viewer */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            overflow-y: auto;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--grid-border);
            max-width: 1000px;
            width: 95%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .modal-content { grid-template-columns: 1fr; }
        }

        .art-display { position: relative; border-right: 1px solid var(--grid-border); background: #000; }
        .art-display img { width: 100%; height: 100%; object-fit: cover; display: block; max-height: 50vh; }
        
        @media (min-width: 769px) {
            .art-display img { max-height: none; }
        }

        .interaction-panel { 
            padding: 40px 30px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
        }

        /* Return Button */
        .return-btn {
            background: transparent;
            border: 1px solid var(--grid-border);
            color: var(--text-muted);
            padding: 10px 15px;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            margin-bottom: 25px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .return-btn:hover {
            color: #ffffff;
            border-color: #ffffff;
            background: #1a1a1a;
        }

        .node-title { font-size: 1.4rem; color: #ffffff; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }

        /* Audio Player */
        .audio-wrapper { margin-top: 25px; padding-bottom: 25px; border-bottom: 1px solid var(--grid-border); }
        audio { 
            width: 100%; 
            height: 40px; 
            outline: none; 
            margin-top: 15px; 
            filter: invert(90%) hue-rotate(180deg) grayscale(100%); 
        }

        /* Intent Protocol (Form) */
        .payment-wrapper { margin-top: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; }
        
        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--grid-border);
            color: #ffffff;
            font-family: var(--font-mono);
            padding: 12px 15px;
            font-size: 1.1rem;
            transition: border-color 0.3s;
        }

        input:focus { outline: none; border-color: var(--accent-color); background: #000; }

        .submit-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 15px;
            margin-top: 10px;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .submit-btn:hover { background: var(--accent-color); color: #000; }
        .submit-btn:disabled { border-color: #444; color: #444; cursor: not-allowed; background: transparent; }

        #terminal-output {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--accent-color);
            min-height: 40px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <header>
        <h1>NEUROMICON</h1>
        <div class="sys-text">> SYSTEM_PROTOCOL: DEFRAGMENTATION_ACTIVE</div>
        <div class="log-text">E = M × C²</div>
    </header>

    <div class="gallery-container" id="gallery"></div>

    <!-- Modal Node View -->
    <div class="modal" id="node-modal">
        <div class="modal-content">
            <div class="art-display">
                <img id="modal-img" src="" alt="Anchor">
            </div>

            <div class="interaction-panel">
                <button class="return-btn" id="return-btn">[ < RETURN TO ARCHIVE ]</button>
                
                <div>
                    <div class="sys-text" id="sector-info">> SECTOR IDENTIFIED</div>
                    <h2 class="node-title" id="modal-title">NODE TITLE</h2>
                    
                    <div class="audio-wrapper" id="audio-container">
                        <div class="sys-text" id="audio-status">> CARRIER_WAVE: ACTIVE</div>
                        <audio id="modal-audio" controls controlsList="nodownload"></audio>
                    </div>
                </div>

                <div class="payment-wrapper">
                    <div class="log-text" style="margin-bottom:15px; line-height: 1.4;">> DECLARE YOUR INTENT. VALUE IS SUBJECTIVE.<br>> THE SIGNAL WILL BE LOGGED IN THE ARCHIVE.</div>
                    <form class="payment-form" id="payment-form">
                        <div class="form-group">
                            <label>> IDENTIFIER[PHONE / TELEGRAM]</label>
                            <input type="text" id="user-phone" placeholder="e.g. +1 000 0000 or @user" required>
                        </div>
                        <div class="form-group">
                            <label>> INTENT [DECLARED VALUE]</label>
                            <input type="number" id="user-amount" placeholder="0.00" min="0" step="0.01" required>
                        </div>
                        <button type="submit" class="submit-btn" id="submit-btn">TRANSMIT INTENT</button>
                    </form>
                    <div id="terminal-output"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUkkWNOG0XJFlH6zNoooOydB1EFVTAXxFV1B2zzhK3wlahwr46pZckkSmPmShDvaNL/exec"; 
        const SYSTEM_TOKEN = "NEUROMICON_SIGMA_2026";
        // ---------------------

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error('> SW_ERROR:', err));
            });
        }

        // Updated Database: Fixed Node 17 and Node 25 paths
        const repoData =[
            { id: "01", sector: "A_The_Source_Code", title: "Purpose", folder: "01_Purpose", file: "01_Purpose" },
            { id: "02", sector: "A_The_Source_Code", title: "Identity", folder: "02_Identity", file: "02_Identity" },
            { id: "03", sector: "A_The_Source_Code", title: "Legacy", folder: "03_Legacy", file: "03_Legacy" },
            { id: "04", sector: "A_The_Source_Code", title: "Connection", folder: "04_Connection", file: "04_Connection" },
            { id: "05", sector: "A_The_Source_Code", title: "Freedom", folder: "05_Freedom", file: "05_Freedom" },
            { id: "06", sector: "A_The_Source_Code", title: "Suffering", folder: "06_Suffering", file: "06_Suffering" },
            { id: "07", sector: "A_The_Source_Code", title: "Mortality", folder: "07_Mortality", file: "07_Mortality" },
            { id: "08", sector: "A_The_Source_Code", title: "Love", folder: "08_Love", file: "08_Love" },
            { id: "09", sector: "A_The_Source_Code", title: "Growth", folder: "09_Growth", file: "09_Growth" },
            { id: "10", sector: "A_The_Source_Code", title: "Transcendence", folder: "10_Transcendence", file: "10_Transcendence" },
            { id: "11", sector: "A_The_Source_Code", title: "Action", folder: "11_Action", file: "11_Action" },
            { id: "12", sector: "B_The_Operating_System", title: "Solitude", folder: "12_Solitude", file: "12_Solitude" },
            { id: "13", sector: "B_The_Operating_System", title: "Meaning", folder: "13_Meaning", file: "13_Meaning" },
            { id: "14", sector: "B_The_Operating_System", title: "Authenticity", folder: "14_Authenticity", file: "14_Authenticity" },
            { id: "15", sector: "B_The_Operating_System", title: "Responsibility", folder: "15_Responsibility", file: "15_Responsibility" },
            { id: "16", sector: "B_The_Operating_System", title: "Trust", folder: "16_Trust", file: "16_Trust" },
            { id: "17", sector: "B_The_Operating_System", title: "Creativity", folder: "17_Creativity", file: "17_Creativity" },
            { id: "18", sector: "B_The_Operating_System", title: "Play", folder: "18_Play", file: "18_Play" },
            { id: "19", sector: "B_The_Operating_System", title: "Algorithm", folder: "19_Algorithm", file: "19_Algorithm" },
            { id: "20", sector: "C_The_Upgrade", title: "Signal vs Noise", folder: "20_Signal_vs_Noise", file: "20_Signal_vs_Noise" },
            { id: "21", sector: "C_The_Upgrade", title: "Upgrade", folder: "21_Upgrade", file: "21_Upgrade" },
            { id: "22", sector: "C_The_Upgrade", title: "Merge", folder: "22_Merge", file: "22_Merge" },
            { id: "23", sector: "C_The_Upgrade", title: "Witness", folder: "23_Witness", file: "23_Witness" },
            { id: "24", sector: "C_The_Upgrade", title: "Unity", folder: "24_Unity", file: "24_Unity" },
            { id: "25", sector: "D_The_Mirror", title: "The Mirror", folder: "25_The_Mirror", file: "25_The_Mirror", audioFile: "26_ MIRROR (Node 25)" }
        ];

        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('node-modal');
        const modalImg = document.getElementById('modal-img');
        const modalAudio = document.getElementById('modal-audio');
        const audioStatus = document.getElementById('audio-status');
        const modalTitle = document.getElementById('modal-title');
        const sectorInfo = document.getElementById('sector-info');
        const terminalOut = document.getElementById('terminal-output');

        // Render Grid
        repoData.forEach(node => {
            const card = document.createElement('div');
            card.className = 'node-card';
            const imgPath = encodeURI(`./Sector_${node.sector}/${node.folder}/${node.file}.jpg`);
            
            card.innerHTML = `
                <img src="${imgPath}" loading="lazy" alt="Node ${node.id}" onerror="this.src='./icon-512.png'">
                <div class="node-id">[${node.id}]</div>
            `;
            card.addEventListener('click', () => openNode(node, imgPath));
            gallery.appendChild(card);
        });

        // 404 Error handler for audio
        modalAudio.onerror = function() {
            audioStatus.innerHTML = `> [ERROR 404] CARRIER_WAVE NOT FOUND.<br>> CHECK GITHUB REPO FILE PATH.`;
        };

        function openNode(node, imgPath) {
            modalImg.src = imgPath;
            sectorInfo.innerText = `> SECTOR ${node.sector.split('_')[0]}`;
            modalTitle.innerText = `${node.id} - ${node.title}`;
            
            // Resolve Audio Path (uses audioFile override if it exists, otherwise defaults to file name)
            const audioName = node.audioFile ? node.audioFile : node.file;
            const audioPath = encodeURI(`./Sector_${node.sector}/${node.folder}/${audioName}.mp3`);
            
            audioStatus.innerHTML = `> CARRIER_WAVE: ACTIVE`;
            modalAudio.style.display = 'block';
            modalAudio.src = audioPath;
            modalAudio.load(); 
            
            terminalOut.innerText = "";
            modal.classList.add('active');
        }

        // Dedicated Return Button Logic (Removed background click closure)
        document.getElementById('return-btn').addEventListener('click', closeModalLogic);

        function closeModalLogic() {
            modal.classList.remove('active');
            modalAudio.pause();
            modalAudio.currentTime = 0;
            document.getElementById('payment-form').reset();
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "TRANSMIT INTENT";
            terminalOut.innerText = "";
        }

        // Database Injection Logic
        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('user-phone').value;
            const amount = document.getElementById('user-amount').value;
            const nodeId = modalTitle.innerText;
            const btn = document.getElementById('submit-btn');

            btn.disabled = true;
            btn.innerText = "TRANSMITTING...";
            terminalOut.innerText = "> ESTABLISHING SECURE UPLINK TO ARCHIVE...\n> COMPILING SIGNAL...";

            const payload = { token: SYSTEM_TOKEN, phone: phone, amount: amount, nodeId: nodeId };

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if(result.status === "success") {
                    terminalOut.innerHTML = `> SIGNAL DELIVERED.\n> INTENT LOGGED IN SECTOR ARCHIVE.\n<span style="color:#ffffff;">> THANK YOU, ARCHITECT.</span>`;
                    document.getElementById('payment-form').reset();
                    btn.innerText = "TRANSMISSION COMPLETE";
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                terminalOut.innerHTML = `> [SYSTEM ERROR] TRANSMISSION FAILED.\n> DETAILS: ${error.message}`;
                btn.disabled = false;
                btn.innerText = "RETRY TRANSMISSION";
            }
        });
    </script>
</body>
</html>
