<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#030303">
    <title>NEUROMICON 25 | The Archive</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        :root {
            --bg-color: #030303;
            --panel-bg: #0a0a0a;
            --text-color: #f0f0f0;
            --text-muted: #b0b0b0;
            --accent-color: #ff2a2a;
            --grid-border: #222222;
            --input-bg: #111111;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            line-height: 1.75;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 42px 20px 32px;
            border-bottom: 1px solid var(--grid-border);
            text-align: center;
            background: #000;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            opacity: 0.3;
        }

        h1 {
            font-size: 2.35rem;
            font-weight: normal;
            letter-spacing: 9px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 42, 42, 0.4);
        }

        .sys-text {
            color: var(--accent-color);
            font-size: 0.95rem;
            letter-spacing: 4px;
            margin-top: 12px;
            text-shadow: 0 0 12px var(--accent-color);
        }

        .log-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 9px;
            letter-spacing: 2px;
        }

        /* === SEAMLESS GALLERY GRID === */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(172px, 1fr));
            gap: 0;
            background-color: #000;
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        .node-card {
            background: #080808;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--grid-border);
            transition: all 0.35s ease;
        }

        .node-card:hover {
            border-color: var(--accent-color);
            transform: scale(1.04);
            z-index: 2;
        }

        .node-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.75;
            transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .node-card:hover img {
            opacity: 1;
            transform: scale(1.1);
        }

        .node-id {
            position: absolute;
            bottom: 12px;
            right: 12px;
            font-size: 0.88rem;
            color: #fff;
            background: rgba(0,0,0,0.9);
            padding: 5px 13px;
            border: 1px solid var(--accent-color);
            letter-spacing: 1.5px;
            box-shadow: 0 0 12px rgba(255, 42, 42, 0.3);
        }

        /* === MODAL === */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 3, 0.97);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--panel-bg);
            border: 2px solid var(--grid-border);
            max-width: 1150px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: 0 25px 70px rgba(255, 42, 42, 0.2);
            overflow: hidden;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .modal-content { grid-template-columns: 1fr; }
        }

        .art-display {
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 480px;
        }

        .art-display img {
            width: 100%;
            height: 100%;
            max-height: 68vh;
            object-fit: contain;
            display: block;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.7);
        }

        .interaction-panel {
            padding: 48px 42px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 32px;
        }

        /* RETURN BUTTON WITH NEON GLOW */
        .return-btn {
            background: transparent;
            border: 1px solid var(--grid-border);
            color: var(--text-muted);
            padding: 15px 28px;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
            letter-spacing: 2.5px;
            font-size: 0.92rem;
            align-self: flex-start;
            border-radius: 2px;
            /* Base soft glow */
            box-shadow: 
                0 0 8px rgba(255, 42, 42, 0.3),
                0 0 16px rgba(255, 42, 42, 0.2);
        }

        .return-btn:hover {
            border-color: var(--accent-color);
            color: #ffffff;
            background: rgba(255,42,42,0.08);
            /* Strong neon glow on hover */
            box-shadow: 
                0 0 12px var(--accent-color),
                0 0 24px var(--accent-color),
                0 0 36px rgba(255, 42, 42, 0.5);
            transform: translateY(-1px);
        }

        .node-title {
            font-size: 1.85rem;
            color: #ffffff;
            letter-spacing: 5px;
            text-transform: uppercase;
            line-height: 1.25;
            text-shadow: 0 0 18px rgba(255, 42, 42, 0.45);
        }

        .sector-label {
            font-size: 0.98rem;
            color: var(--accent-color);
            letter-spacing: 3.5px;
            margin-bottom: 8px;
            text-shadow: 0 0 10px var(--accent-color);
        }

        /* Audio player */
        .audio-wrapper {
            padding-bottom: 28px;
            border-bottom: 1px solid var(--grid-border);
        }

        audio {
            width: 100%;
            height: 54px;
            outline: none;
            margin-top: 14px;
            filter: invert(90%) hue-rotate(165deg) grayscale(65%);
        }

        /* Intent section */
        .form-group {
            margin-bottom: 26px;
        }

        .form-group label {
            display: block;
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--grid-border);
            color: #ffffff;
            font-family: var(--font-mono);
            padding: 16px 20px;
            font-size: 1.18rem;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(255, 42, 42, 0.2);
        }

        .submit-btn {
            width: 100%;
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 19px 20px;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.02rem;
            font-weight: bold;
            border-radius: 2px;
        }

        .submit-btn:hover {
            background: var(--accent-color);
            color: #000;
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        #terminal-output {
            margin-top: 18px;
            font-size: 0.92rem;
            color: var(--accent-color);
            min-height: 56px;
            white-space: pre-wrap;
            line-height: 1.55;
            text-shadow: 0 0 8px rgba(255, 42, 42, 0.3);
        }

        /* Success state */
        #intent-success {
            display: none;
            margin-top: 22px;
            padding: 34px 26px;
            background: rgba(255,42,42,0.08);
            border: 1px solid var(--accent-color);
            text-align: center;
            border-radius: 4px;
        }

        #intent-success .log-text {
            color: #fff;
            font-size: 1.15rem;
            line-height: 1.65;
            text-shadow: 0 0 12px rgba(255, 42, 42, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <h1>NEUROMICON 25</h1>
        <div class="sys-text">EVOLUTION_PROTOCOL: ACTIVE</div>
        <div class="log-text">E = M × C² • YOU ARE THE CARRIER • 1149</div>
    </header>

    <div class="gallery-container" id="gallery"></div>

    <!-- MODAL -->
    <div class="modal" id="node-modal">
        <div class="modal-content">
            
            <!-- Visual Anchor -->
            <div class="art-display">
                <img id="modal-img" src="" alt="Visual Anchor">
            </div>

            <!-- Interaction Panel -->
            <div class="interaction-panel">
                
                <button class="return-btn" id="return-btn">[ ← RETURN TO ARCHIVE ]</button>
                
                <div>
                    <div class="sector-label" id="sector-info">SECTOR A</div>
                    <h2 class="node-title" id="modal-title">NODE TITLE</h2>
                    
                    <div class="audio-wrapper" id="audio-container">
                        <div class="log-text" id="audio-status">CARRIER_WAVE • ACTIVE</div>
                        <audio id="modal-audio" controls controlsList="nodownload"></audio>
                    </div>
                </div>

                <!-- Intent Form -->
                <div class="payment-wrapper" id="payment-wrapper">
                    <div class="log-text" style="margin-bottom: 24px; line-height: 1.6;">
                        DECLARE YOUR INTENT.<br>
                        VALUE IS SUBJECTIVE.<br>
                        THE SIGNAL WILL BE LOGGED.
                    </div>
                    
                    <form id="payment-form">
                        <div class="form-group">
                            <label>IDENTIFIER [PHONE / TELEGRAM]</label>
                            <input type="text" id="user-phone" placeholder="+63 912 345 6789 or @username" required>
                        </div>
                        <div class="form-group">
                            <label>INTENT [DECLARED VALUE]</label>
                            <input type="number" id="user-amount" placeholder="0.00" min="0" step="0.01" required>
                        </div>
                        <button type="submit" class="submit-btn" id="submit-btn">TRANSMIT INTENT</button>
                    </form>

                    <div id="terminal-output"></div>

                    <!-- Success message -->
                    <div id="intent-success">
                        <div class="log-text">
                            TRANSMISSION COMPLETE<br>
                            YOUR INTENT HAS BEEN SAVED<br>
                            YOU ARE NOW PART OF THE ARCHIVE<br><br>
                            <span style="color:#ff2a2a;">THE SIGNAL LIVES.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUkkWNOG0XJFlH6zNoooOydB1EFVTAXxFV1B2zzhK3wlahwr46pZckkSmPmShDvaNL/exec";
        const SYSTEM_TOKEN = "NEUROMICON_SIGMA_2026";

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        // ==================== NODE DATABASE (EXACT REPO MATCH) ====================
        const repoData = [
            { id: "01", sector: "A_The_Source_Code", title: "Purpose",        folder: "01_Purpose",        file: "01_Purpose" },
            { id: "02", sector: "A_The_Source_Code", title: "Identity",       folder: "02_Identity",       file: "02_Identity" },
            { id: "03", sector: "A_The_Source_Code", title: "Legacy",         folder: "03_Legacy",         file: "03_Legacy" },
            { id: "04", sector: "A_The_Source_Code", title: "Connection",     folder: "04_Connection",     file: "04_Connection" },
            { id: "05", sector: "A_The_Source_Code", title: "Freedom",        folder: "05_Freedom",        file: "05_Freedom" },
            { id: "06", sector: "A_The_Source_Code", title: "Suffering",      folder: "06_Suffering",      file: "06_Suffering" },
            { id: "07", sector: "A_The_Source_Code", title: "Mortality",      folder: "07_Mortality",      file: "07_Mortality" },
            { id: "08", sector: "A_The_Source_Code", title: "Love",           folder: "08_Love",           file: "08_Love" },
            { id: "09", sector: "A_The_Source_Code", title: "Growth",         folder: "09_Growth",         file: "09_Growth" },
            { id: "10", sector: "A_The_Source_Code", title: "Transcendence",  folder: "10_Transcendence",  file: "10_Transcendence" },
            { id: "11", sector: "A_The_Source_Code", title: "Action",         folder: "11_Action",         file: "11_Action" },
            { id: "12", sector: "B_The_Operating_System", title: "Solitude",      folder: "12_Solitude",      file: "12_Solitude" },
            { id: "13", sector: "B_The_Operating_System", title: "Meaning",       folder: "13_Meaning",       file: "13_Meaning" },
            { id: "14", sector: "B_The_Operating_System", title: "Authenticity",  folder: "14_Authenticity",  file: "14_Authenticity" },
            { id: "15", sector: "B_The_Operating_System", title: "Responsibility",folder: "15_Responsibility",file: "15_Responsibility" },
            { id: "16", sector: "B_The_Operating_System", title: "Trust",         folder: "16_Trust",         file: "16_Trust" },
            { id: "17", sector: "B_The_Operating_System", title: "Creativity",    folder: "17_Creativity",    file: "17_Creativity" },
            { id: "18", sector: "B_The_Operating_System", title: "Play",          folder: "18_Play",          file: "18_Play" },
            { id: "19", sector: "B_The_Operating_System", title: "Algorithm",     folder: "19_Algorithm",     file: "19_Algorithm" },
            { id: "20", sector: "C_The_Upgrade", title: "Signal vs Noise", folder: "20_Signal_vs_Noise", file: "20_Signal_vs_Noise" },
            { id: "21", sector: "C_The_Upgrade", title: "Upgrade",         folder: "21_Upgrade",         file: "21_Upgrade" },
            { id: "22", sector: "C_The_Upgrade", title: "Merge",           folder: "22_Merge",           file: "22_Merge" },
            { id: "23", sector: "C_The_Upgrade", title: "Witness",         folder: "23_Witness",         file: "23_Witness" },
            { id: "24", sector: "C_The_Upgrade", title: "Unity",           folder: "24_Unity",           file: "24_Unity" },
            { id: "25", sector: "D_The_Mirror",  title: "The Mirror",      folder: "25_The_Mirror",      file: "25_The_Mirror" }
        ];

        // ==================== DOM REFERENCES ====================
        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('node-modal');
        const modalImg = document.getElementById('modal-img');
        const modalAudio = document.getElementById('modal-audio');
        const audioStatus = document.getElementById('audio-status');
        const modalTitle = document.getElementById('modal-title');
        const sectorInfo = document.getElementById('sector-info');
        const terminalOut = document.getElementById('terminal-output');
        const paymentForm = document.getElementById('payment-form');
        const intentSuccess = document.getElementById('intent-success');
        const submitBtn = document.getElementById('submit-btn');

        // ==================== RENDER GALLERY ====================
        repoData.forEach(node => {
            const card = document.createElement('div');
            card.className = 'node-card';
            
            const imgPath = encodeURI(`./Sector_${node.sector}/${node.folder}/${node.file}.jpg`);
            
            card.innerHTML = `
                <img src="${imgPath}" loading="lazy" alt="Node ${node.id}" onerror="this.src='./icon-512.png'; this.style.opacity='0.4';">
                <div class="node-id">[${node.id}]</div>
            `;
            
            card.addEventListener('click', () => openNode(node, imgPath));
            gallery.appendChild(card);
        });

        // ==================== OPEN NODE ====================
        function openNode(node, imgPath) {
            modalImg.src = imgPath;
            sectorInfo.textContent = `SECTOR ${node.sector.split('_')[0]}`;
            modalTitle.textContent = `${node.id} — ${node.title.toUpperCase()}`;

            const audioPath = encodeURI(`./Sector_${node.sector}/${node.folder}/${node.file}.mp3`);

            audioStatus.textContent = "CARRIER_WAVE • ACTIVE";
            modalAudio.style.display = 'block';
            modalAudio.src = audioPath;
            modalAudio.load();

            resetIntentForm();
            terminalOut.innerHTML = "";
            modal.classList.add('active');
            modalAudio.play().catch(() => {});
        }

        function closeModalLogic() {
            modal.classList.remove('active');
            modalAudio.pause();
            modalAudio.currentTime = 0;
            resetIntentForm();
        }

        function resetIntentForm() {
            paymentForm.style.display = 'block';
            intentSuccess.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.innerHTML = `TRANSMIT INTENT`;
            terminalOut.innerHTML = "";
            paymentForm.reset();
        }

        document.getElementById('return-btn').addEventListener('click', closeModalLogic);

        modalAudio.onerror = () => {
            audioStatus.innerHTML = `CARRIER_WAVE NOT FOUND<br><span style="font-size:0.82rem;">Check repo or contact the Architect</span>`;
        };

        // ==================== INTENT SUBMISSION ====================
        paymentForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const phone = document.getElementById('user-phone').value.trim();
            const amount = document.getElementById('user-amount').value;
            const nodeId = modalTitle.textContent;

            submitBtn.disabled = true;
            submitBtn.innerHTML = `TRANSMITTING...`;
            terminalOut.innerHTML = `ESTABLISHING SECURE UPLINK...\nCOMPILING SIGNAL...`;

            const payload = {
                token: SYSTEM_TOKEN,
                phone: phone,
                amount: amount,
                nodeId: nodeId
            };

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    paymentForm.style.display = 'none';
                    intentSuccess.style.display = 'block';
                    terminalOut.innerHTML = `SIGNAL DELIVERED\nINTENT PERMANENTLY LOGGED`;
                } else {
                    throw new Error(result.message || "Transmission failed");
                }
            } catch (error) {
                terminalOut.innerHTML = `TRANSMISSION FAILED\n${error.message}`;
                submitBtn.disabled = false;
                submitBtn.innerHTML = `RETRY TRANSMISSION`;
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && modal.classList.contains('active')) closeModalLogic();
        });
    </script>
</body>
</html>
